services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  manual-test-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE_REGISTRY: ${BASE_IMAGE_REGISTRY:-docker.io}
    restart: unless-stopped
    ports:
      - "8527:8000"
    env_file:
      - .env
    environment:
      FRONTEND_SESSION_REDIS_URL: redis://redis:6379/0
      PUNCT_BACKEND: ${PUNCT_BACKEND:-local}
      PUNCT_MODEL_DIR: /app/models/punc_ct-transformer_zh-cn-common-vocab272727-pytorch
    depends_on:
      - redis
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
      - ./adds:/app/adds:ro
      - /Users/gj/Documents/vsfile/customer-data-process/models/punc_ct-transformer_zh-cn-common-vocab272727-pytorch:/app/models/punc_ct-transformer_zh-cn-common-vocab272727-pytorch:ro
