  <style>
    :root {

      --bg: #f6f7f8;
      --surface: #ffffff;
      --surface-2: #eef2f4;
      --ink: #182026;
      --muted: #64717c;
      --line: #d8e0e6;
      --accent: #0f766e;
      --accent-soft: #dff4f0;
      --warn: #a65f00;
      --shadow: 0 18px 45px rgba(24, 32, 38, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100%;
      height: 100vh;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button, input {
      font: inherit;
    }

    .app {
      height: 100vh;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--line);
      padding: 18px 24px 16px;
      display: flex;
      gap: 18px;
      align-items: flex-end;
      justify-content: space-between;
    }

    .title h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 760;
    }

    .title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 112px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 18px;
      line-height: 1.15;
    }

    main {
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(420px, 32vw) minmax(520px, 1fr);
      grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
    }

    main > section[aria-label="完整树"] {
      grid-column: 1;
      grid-row: 1 / 3;
    }

    main > section[aria-label="逐层选择"] {
      grid-column: 2;
      grid-row: 1;
    }

    main > aside[aria-label="选择明细"] {
      grid-column: 2;
      grid-row: 2;
    }

    .panel {
      min-height: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(#ffffff, #fbfcfc);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }

    .panel-head p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    aside[aria-label="选择明细"] .panel-head {
      padding: 8px 10px;
    }

    aside[aria-label="选择明细"] .panel-head h2 {
      font-size: 13px;
      line-height: 1.15;
    }

    aside[aria-label="选择明细"] .panel-head p {
      margin-top: 2px;
      font-size: 11px;
      line-height: 1.2;
    }

    aside[aria-label="选择明细"] .toolbar {
      margin-top: 6px;
      gap: 6px;
    }

    aside[aria-label="选择明细"] .text-btn {
      height: 28px;
      padding: 0 9px;
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .search {
      width: 100%;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 10px;
      background: #fff;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .icon-btn, .text-btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      height: 34px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .icon-btn {
      width: 36px;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .text-btn {
      padding: 0 11px;
    }

    .icon-btn:hover, .text-btn:hover {
      background: var(--surface-2);
      border-color: #b9c6ce;
    }

    .icon-btn:active, .text-btn:active {
      transform: translateY(1px);
    }

    .tree-scroll, .drill-scroll, .detail-scroll {
      overflow: auto;
      min-height: 0;
      flex: 1 1 auto;
    }

    .tree {
      padding: 10px 8px 18px;
    }

    .tree-node {
      margin: 2px 0;
    }

    .node-row {
      min-height: 34px;
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 4px;
      border-radius: var(--radius);
      padding: 3px 7px 3px 2px;
      cursor: pointer;
      transition: background 130ms ease, color 130ms ease;
    }

    .node-row:hover {
      background: #f1f5f6;
    }

    .node-row.selected {
      background: var(--accent-soft);
      color: #074d47;
    }

    .twisty {
      width: 24px;
      height: 24px;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px;
    }

    .twisty:hover {
      background: rgba(15, 118, 110, 0.1);
      color: var(--accent);
    }

    .label {
      overflow-wrap: anywhere;
      font-size: 13px;
      line-height: 1.32;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
      background: #f2f5f6;
      border-radius: 999px;
      padding: 2px 7px;
    }

    .children {
      margin-left: 18px;
      padding-left: 9px;
      border-left: 1px solid #e6ecef;
      display: none;
    }

    .tree-node.open > .children {
      display: block;
    }

    .drill {
      min-height: 100%;
      padding: 14px;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(240px, 310px);
      gap: 12px;
      align-items: start;
      align-content: start;
    }

    .level-column {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fbfcfc;
      min-height: 160px;
    }

    .level-title {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      background: #fff;
    }

    .choice {
      width: 100%;
      min-height: 40px;
      border: 0;
      border-bottom: 1px solid #ebf0f2;
      background: transparent;
      padding: 9px 11px;
      text-align: left;
      cursor: pointer;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      color: var(--ink);
      transition: background 130ms ease;
    }

    .choice:hover {
      background: #eff5f4;
    }

    .choice.active {
      background: var(--accent-soft);
      color: #074d47;
    }

    .choice-name {
      font-size: 13px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .choice-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .detail-scroll {
      padding: 14px;
    }

    .path {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

      background: #f3f7f8;
      border: 1px solid #e0e8ec;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .empty {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      padding: 12px 0;
    }

      grid-template-columns: 92px 1fr;
      gap: 9px 12px;
      padding: 13px 0;
      border-top: 1px solid var(--line);
      font-size: 13px;
    }

    .kv dt {
      color: var(--muted);
    }

    .kv dd {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;

      padding-top: 12px;
      margin-top: 2px;

      font-size: 13px;
      line-height: 1.25;
    }

    .leaf-path-list {

      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

      gap: 8px;
      align-items: start;
      padding: 8px 9px;
      border: 1px solid #e0e8ec;
      background: #f8fbfb;
      border-radius: var(--radius);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .leaf-no {
      width: 26px;
      min-height: 22px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #074d47;
      font-weight: 700;
      font-size: 11px;
      line-height: 1;
    }

    .selected-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .selected-link-number {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 10px;
      padding: 7px 9px;
      border-radius: var(--radius);
      background: var(--accent-soft);
      color: #074d47;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .selected-link-number span {
      color: #315f59;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(12px);
      background: #182026;
      color: white;
      padding: 9px 12px;
      border-radius: var(--radius);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    mark {
      background: #fff0b3;
      color: inherit;
      padding: 0 1px;
      border-radius: 2px;

        grid-row: auto;
      }
      main > section[aria-label="逐层选择"] {
        min-height: 0;
      }
      .panel {
        min-height: 0;
      }
      .stats {
        justify-content: flex-start;
      }
    }

    const byId = new Map();
    let selectedPath = [];
    let selectedNode = null;
    let searchTerm = "";
    let focusedLinkPath = null;
    let collapsedNodeIds = new Set();

    function walk(nodes, fn) {
      nodes.forEach((node) => {
        byId.set(node.id, node);
        fn(node);
        walk(node.children, fn);
      });
    }
    walk(data.roots, () => null);

    const recordCount = document.getElementById("recordCount");
    const currentLevel = document.getElementById("currentLevel");
    const treeEl = document.getElementById("tree");
    const drillEl = document.getElementById("drill");
    const detailEl = document.getElementById("detail");
    const searchEl = document.getElementById("search");
    const toastEl = document.getElementById("toast");

    recordCount.textContent = data.recordCount;

    function stripPrefix(label) {
      const idx = label.indexOf("：");
      return idx >= 0 ? label.slice(idx + 1) : label;
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function highlight(text) {
      const safe = escapeHtml(text);
      if (!searchTerm) return safe;
      const escapedTerm = searchTerm.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return safe.replace(new RegExp(escapedTerm, "gi"), (match) => `<mark>${match}</mark>`);
    }

    function nodeMatches(node) {
      if (focusedLinkPath) return true;
      if (!searchTerm) return true;
      const haystack = [
        node.label,
        node.path.join(" "),
        node.summary.links,
        node.summary.endpoint,
        node.summary.sourceRows,
      ].join(" ").toLowerCase();
      return haystack.includes(searchTerm.toLowerCase()) || node.children.some(nodeMatches);
    }

    function normalizeLinkNumber(value) {
      return String(value ?? "")
        .trim()
        .replace(/[０-９]/g, (char) => String(char.charCodeAt(0) - 65296));
    }

    function linkNumbersFor(node) {
      return String(node.summary.links || "")
        .split(/[、,，\s]+/)
        .map(normalizeLinkNumber)
        .filter(Boolean);
    }

    function findLeafPathByLinkNumber(linkNumber, nodes = data.roots, path = []) {
      for (const node of nodes) {
        const nextPath = [...path, node];
        if (!node.children.length && linkNumbersFor(node).includes(linkNumber)) return nextPath;
        const found = findLeafPathByLinkNumber(linkNumber, node.children, nextPath);
        if (found) return found;
      }
      return null;
    }

    function renderTree(nodes, root = false) {
      return nodes
        .filter(nodeMatches)
        .map((node) => {
          const hasChildren = node.children.length > 0;
          const isSelected = selectedNode?.id === node.id;
          const openPath = focusedLinkPath || selectedPath;
          const shouldOpen = hasChildren && !collapsedNodeIds.has(node.id) && (
            openPath.some((item) => item.id === node.id) || (!focusedLinkPath && Boolean(searchTerm))
          );
          return `
            <div class="tree-node ${shouldOpen ? "open" : ""}" data-node-id="${node.id}">
              <div class="node-row ${isSelected ? "selected" : ""}" style="padding-left:${root ? 2 : 0}px" data-select-id="${node.id}">
                <button class="twisty" type="button" data-toggle-id="${node.id}" title="${hasChildren ? "展开/收起" : "末级节点"}">${hasChildren ? (shouldOpen ? "⌄" : "›") : "·"}</button>
                <div class="label">${highlight(node.label)}</div>
                <span class="count">${node.summary.recordCount}</span>
              </div>
              ${hasChildren ? `<div class="children">${renderTree(node.children)}</div>` : ""}
            </div>
          `;
        })
        .join("");
    }

    function selectNode(node, path, options = {}) {
      selectedNode = node;
      selectedPath = path;
      if (!options.keepFocusedLinkPath) focusedLinkPath = null;
      if (!options.preserveCollapsed) collapsedNodeIds.clear();
      currentLevel.textContent = node ? String(node.level) : "-";
      renderAll();
    }

    function findPath(targetId, nodes = data.roots, path = []) {
      for (const node of nodes) {
        const nextPath = [...path, node];
        if (node.id === targetId) return nextPath;
        const found = findPath(targetId, node.children, nextPath);
        if (found) return found;
      }
      return null;
    }

    function levelsForPath() {
      const columns = [];
      let nodes = data.roots;
      let level = 1;
      columns.push({ level, nodes, activeId: selectedPath[0]?.id });
      for (const node of selectedPath) {
        if (!node.children.length) break;
        level += 1;
        columns.push({ level, nodes: node.children, activeId: selectedPath[level - 1]?.id });
      }
      return columns;
    }

    function renderDrill() {
      drillEl.innerHTML = levelsForPath()
        .map((column) => `
          <div class="level-column">
            <div class="level-title">第 ${column.level} 层</div>
            ${column.nodes.map((node) => `
              <button class="choice ${column.activeId === node.id ? "active" : ""}" type="button" data-choice-id="${node.id}">
                <span class="choice-name">${escapeHtml(stripPrefix(node.label))}</span>
                <span class="choice-meta">${node.summary.recordCount} 条</span>
              </button>
            `).join("")}
          </div>
        `)
        .join("");
    }

    function collectLeafPaths(node, prefix = []) {
      const current = [...prefix, node];
      if (!node.children.length) {
        return [current];
      }
      return node.children.flatMap((child) => collectLeafPaths(child, current));
    }

    function renderLeafPathList(node) {
      if (!node.children.length) return "";
      const leafPaths = collectLeafPaths(node).map((path) => path.slice(1));
      if (!leafPaths.length) return "";
      return `
        <div class="leaf-paths">
          <h4>当前节点到叶子节点路径（${leafPaths.length} 条）</h4>
          <ol class="leaf-path-list">
            ${leafPaths.map((path) => `
              <li><span class="leaf-no">${escapeHtml(path[path.length - 1].summary.links)}</span><span>${path.map((item) => escapeHtml(item.label)).join(" > ")}</span></li>
            `).join("")}
          </ol>
        </div>
      `;
    }

    function renderDetail() {
      if (!selectedNode) {
        detailEl.innerHTML = `
          <div class="empty">请选择任意节点。你可以从“完整树”直接点，也可以在“逐层选择”里从第 1 层开始逐步进入。</div>
        `;
        return;
      }
      const s = selectedNode.summary;
      detailEl.innerHTML = `
        <h3 class="selected-title">${escapeHtml(selectedNode.label)}</h3>
        <div class="selected-link-number"><span>当前链路编号</span>${escapeHtml(s.links || "-")}</div>
        <div class="path">
          ${selectedPath.map((node) => `<div class="crumb">${escapeHtml(node.label)}</div>`).join("")}
        </div>
        <dl class="kv">
          <dt>记录数</dt><dd>${escapeHtml(s.recordCount)}</dd>
          <dt>覆盖编号</dt><dd>${escapeHtml(s.links || "-")}</dd>
          <dt>链路结点</dt><dd>${escapeHtml(s.endpoint || "-")}</dd>
        </dl>
        ${renderLeafPathList(selectedNode)}
      `;
    }

    function renderAll() {
      treeEl.innerHTML = renderTree(data.roots, true);
      renderDrill();
      renderDetail();
    }

    function showToast(text) {
      toastEl.textContent = text;
      toastEl.classList.add("show");
      window.setTimeout(() => toastEl.classList.remove("show"), 1400);
    }

    treeEl.addEventListener("click", (event) => {
      const toggle = event.target.closest("[data-toggle-id]");
      const row = toggle?.closest("[data-select-id]") || event.target.closest("[data-select-id]");
      if (!row) return;
      const targetId = toggle?.dataset.toggleId || row.dataset.selectId;
      const path = findPath(targetId);
      const nodeWrap = toggle?.closest(".tree-node");
      const hasChildren = Boolean(nodeWrap?.querySelector(":scope > .children"));
      if (toggle && hasChildren) {
        event.stopPropagation();
        focusedLinkPath = null;
        searchTerm = "";
        if (nodeWrap.classList.contains("open")) {
          collapsedNodeIds.add(targetId);
        } else {
          collapsedNodeIds.delete(targetId);
        }
        if (path) selectNode(path[path.length - 1], path, { preserveCollapsed: true });
        return;
      }
      if (path) selectNode(path[path.length - 1], path);
    });

    drillEl.addEventListener("click", (event) => {
      const choice = event.target.closest("[data-choice-id]");
      if (!choice) return;
      const path = findPath(choice.dataset.choiceId);
      if (path) selectNode(path[path.length - 1], path);
    });

    searchEl.addEventListener("input", () => {
      focusedLinkPath = null;
      collapsedNodeIds.clear();
      searchTerm = "";
      renderAll();
    });

    searchEl.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      const linkNumber = normalizeLinkNumber(searchEl.value);
      if (!linkNumber) return;
      const path = findLeafPathByLinkNumber(linkNumber);
      if (!path) {
        showToast(`未找到链路编号 ${linkNumber}`);
        return;
      }
      searchTerm = "";
      collapsedNodeIds.clear();
      focusedLinkPath = path;
      searchEl.value = linkNumber;
      selectNode(path[path.length - 1], path, { keepFocusedLinkPath: true });
    });

    document.getElementById("expandAll").addEventListener("click", () => {
      focusedLinkPath = null;
      collapsedNodeIds.clear();
      searchTerm = " ";
      renderAll();
      searchTerm = "";
      document.querySelectorAll(".tree-node").forEach((node) => node.classList.add("open"));
      document.querySelectorAll(".twisty").forEach((btn) => {
        if (btn.textContent !== "·") btn.textContent = "⌄";
      });
    });

    document.getElementById("collapseAll").addEventListener("click", () => {
      document.querySelectorAll(".tree-node").forEach((node) => node.classList.remove("open"));
      document.querySelectorAll(".twisty").forEach((btn) => {
        if (btn.textContent !== "·") btn.textContent = "›";
      });
    });

    document.getElementById("reset").addEventListener("click", () => {
      selectedNode = null;
      selectedPath = [];
      focusedLinkPath = null;
      collapsedNodeIds.clear();
      currentLevel.textContent = "-";
      renderAll();
    });

    document.getElementById("copyPath").addEventListener("click", async () => {
      if (!selectedPath.length) {
        showToast("还没有选择路径");
        return;
      }
      const text = selectedPath.map((node) => node.label).join(" > ");
      try {
        await navigator.clipboard.writeText(text);
        showToast("路径已复制");
      } catch {
        showToast("浏览器未允许复制");
      }
    });

    renderAll();
  </script>
</body>
</html>
